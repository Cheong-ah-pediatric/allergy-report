<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알레르기 항원 보고서 생성기 - 청아소아청소년과</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f4f7;
  --white: #fff;
  --ink: #1c1c2e;
  --ink2: #52526e;
  --accent: #2d5a8e;
  --accent-lt: #e8f0f8;
  --border: #dde1e9;
  --shadow: 0 2px 10px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

/* ── 앱 헤더 ── */
.app-header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:12px 24px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.app-header img{height:36px;object-fit:contain;}
.app-header .divider{width:1px;height:26px;background:#dde1e9;}
.app-header .title{font-size:14px;font-weight:600;color:var(--accent);}
.app-header .sub{margin-left:auto;font-size:11px;color:#aaa;}

/* ── 레이아웃 ── */
.app-body{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 57px);}

/* ── 입력 패널 ── */
.input-panel{
  background:var(--white);
  border-right:1px solid var(--border);
  padding:20px 18px;
  display:flex;flex-direction:column;gap:16px;
  overflow-y:auto;
}
.panel-title{
  font-size:11px;font-weight:700;letter-spacing:0.8px;
  color:var(--accent);text-transform:uppercase;
  border-bottom:1.5px solid var(--accent-lt);padding-bottom:6px;
}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:11px;font-weight:600;color:var(--ink2);}
.form-group input{
  padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;
  font-family:inherit;font-size:13px;color:var(--ink);background:#fafbfc;outline:none;
  transition:border-color .15s;
}
.form-group input:focus{border-color:var(--accent);background:#fff;}

.hint{
  font-size:11px;color:#888;line-height:1.6;
  background:#f7f8fa;border:1px solid var(--border);border-radius:5px;padding:8px 10px;
}
.hint code{background:#e8eaf0;padding:1px 4px;border-radius:3px;font-size:10.5px;}

textarea{
  padding:10px;border:1.5px solid var(--border);border-radius:6px;
  font-family:inherit;font-size:12px;color:var(--ink);background:#fafbfc;
  resize:vertical;min-height:150px;line-height:1.6;outline:none;
  transition:border-color .15s;width:100%;
}
textarea:focus{border-color:var(--accent);background:#fff;}

.btn-gen{
  background:var(--accent);color:#fff;border:none;border-radius:7px;
  padding:12px;font-family:inherit;font-size:13px;font-weight:700;
  cursor:pointer;letter-spacing:0.3px;transition:background .15s;
}
.btn-gen:hover{background:#1f3f66;}
.btn-print{
  background:transparent;color:var(--accent);border:1.5px solid var(--accent);
  border-radius:7px;padding:9px;font-family:inherit;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.btn-print:hover{background:var(--accent-lt);}
.err{color:#c0392b;font-size:11px;background:#fdf0ef;border:1px solid #f5c6c3;border-radius:4px;padding:7px 9px;display:none;}

/* ── 결과 패널 ── */
.result-panel{padding:24px 28px;overflow-y:auto;}
.placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:10px;color:#bbb;font-size:13px;text-align:center;padding:60px 0;
}

/* ────────────────────────────────────────
   보고서 (화면 + 인쇄 공통)
──────────────────────────────────────── */
.report{display:none;max-width:760px;}

/* 헤더 */
.rpt-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:12px;
}
.rpt-head img{height:32px;object-fit:contain;}
.rpt-head-right{text-align:right;}
.rpt-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.rpt-meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;}
.meta-item{display:flex;flex-direction:column;gap:1px;}
.meta-lbl{font-size:9px;color:var(--ink2);letter-spacing:0.4px;font-weight:600;text-transform:uppercase;}
.meta-val{font-size:13px;font-weight:700;color:var(--ink);}
.meta-val.ige{color:var(--accent);}

/* 요약 바 */
.summary{
  background:var(--accent-lt);border:1px solid #c5d9ee;border-radius:5px;
  padding:7px 12px;margin-bottom:10px;font-size:11px;color:var(--accent);
}

/* ── 메인 테이블 ── */
.rpt-table{
  width:100%;border-collapse:collapse;font-size:11px;
  margin-bottom:10px;
}
.rpt-table th{
  background:#2d5a8e;color:#fff;
  padding:5px 7px;text-align:left;font-size:10px;font-weight:600;
  letter-spacing:0.3px;white-space:nowrap;
}
.rpt-table th:first-child{border-radius:0;}
.rpt-table td{
  padding:5px 7px;border-bottom:1px solid #eaecf0;vertical-align:top;
  line-height:1.45;
}
.rpt-table tr:hover td{background:#f7f9fc;}

/* Class 배지 */
.cb{
  display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:18px;border-radius:9px;font-size:9.5px;font-weight:700;color:#fff;
  white-space:nowrap;
}
.c1{background:#27ae60;} .c2{background:#f39c12;} .c3{background:#e67e22;}
.c4{background:#e74c3c;} .c5{background:#c0392b;} .c6{background:#8e44ad;}

/* 교차반응 태그 */
.ctags{display:flex;flex-wrap:wrap;gap:2px;}
.ct{
  background:#fdf3e8;color:#7b3f00;border:1px solid #f0d5b3;
  padding:1px 5px;border-radius:8px;font-size:9.5px;white-space:nowrap;
}

/* 항원명 */
.aname{font-weight:600;font-size:11.5px;}
.season-badge{
  display:inline-block;background:#e8f0f8;color:#2d5a8e;
  padding:1px 5px;border-radius:8px;font-size:9px;margin-left:3px;
  vertical-align:middle;
}

/* 주의사항 */
.warn-txt{color:#c0392b;font-weight:500;}
/* 개선방법 */
.imp-txt{color:#1a5c3a;font-weight:500;}

/* 푸터 */
.rpt-footer{
  font-size:9px;color:#aaa;line-height:1.7;
  border-top:1px solid var(--border);padding-top:8px;margin-top:8px;
}

/* ────────────────────────────────────────
   인쇄 스타일
──────────────────────────────────────── */
@media print {
  @page{size:A4 portrait;margin:12mm 12mm 12mm 12mm;}
  body{background:#fff;}
  .app-header,.input-panel{display:none!important;}
  .app-body{display:block;}
  .result-panel{padding:0;overflow:visible;}
  .report{display:block!important;max-width:100%;}
  .rpt-table th{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .cb{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .ct{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .summary{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .rpt-head img{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  * {font-size:10px!important;}
  .rpt-title{font-size:14px!important;}
  .meta-val{font-size:12px!important;}
  .aname{font-size:11px!important;}
}

/* ── AI 분석 섹션 ── */
.ai-section {
  margin-top: 16px;
  border: 1.5px solid #c5d9ee;
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
}
.ai-section-header {
  background: linear-gradient(135deg, #2d5a8e 0%, #1a3f6f 100%);
  color: #fff;
  padding: 10px 16px;
  display: flex; align-items: center; gap: 8px;
}
.ai-section-header .ai-badge {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
}
.ai-section-header .ai-title {
  font-size: 13px; font-weight: 700;
}
.ai-section-header .ai-sub {
  font-size: 10px; opacity: 0.7; margin-left: auto;
}
.ai-body {
  padding: 16px;
  font-size: 12px; line-height: 1.8; color: #2c2c3e;
}
.ai-body.loading {
  display: flex; align-items: center; gap: 10px;
  color: #888; font-size: 12px; padding: 20px 16px;
}
.ai-spinner {
  width: 16px; height: 16px;
  border: 2px solid #dde1e9;
  border-top-color: #2d5a8e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* AI 분석 내용 스타일 */
.ai-body h3 {
  font-size: 12px; font-weight: 700; color: #2d5a8e;
  margin: 12px 0 4px; padding-bottom: 3px;
  border-bottom: 1px solid #e8f0f8;
}
.ai-body h3:first-child { margin-top: 0; }
.ai-body ul { padding-left: 16px; margin: 4px 0; }
.ai-body li { margin-bottom: 3px; }
.ai-body strong { color: #1c1c2e; }
.ai-body .highlight {
  background: #fff8e1; border-left: 3px solid #f39c12;
  padding: 6px 10px; margin: 8px 0; border-radius: 0 4px 4px 0;
  font-size: 11px;
}
.ai-body .warning {
  background: #fdf0ef; border-left: 3px solid #c0392b;
  padding: 6px 10px; margin: 8px 0; border-radius: 0 4px 4px 0;
  font-size: 11px;
}
.ai-body .safe {
  background: #f0fdf4; border-left: 3px solid #27ae60;
  padding: 6px 10px; margin: 8px 0; border-radius: 0 4px 4px 0;
  font-size: 11px;
}
.ai-error {
  color: #c0392b; font-size: 11px; padding: 12px 16px;
  background: #fdf0ef;
}

@media print {
  .ai-section { border: 1px solid #ccc; margin-top: 12px; page-break-before: always; }
  .ai-section-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .ai-spinner { display: none; }
}
</style>
</head>

<div class="app-body">
  <!-- 입력 패널 -->
  <div class="input-panel">
    <div class="panel-title" style="color:#2d5a8e;">API 키 설정</div>
    <div class="form-group">
      <label>Google Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="AIza..." style="font-family:monospace;font-size:11px;">
      <div style="display:flex;gap:6px;margin-top:6px;">
        <button onclick="saveApiKey()" style="flex:1;padding:6px;font-size:11px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:5px;cursor:pointer;">저장</button>
        <button onclick="clearApiKey()" style="flex:1;padding:6px;font-size:11px;font-weight:600;background:transparent;color:#c0392b;border:1px solid #f5c6c3;border-radius:5px;cursor:pointer;">삭제</button>
      </div>
      <div id="apiKeyStatus" style="font-size:10px;margin-top:4px;color:#999;"></div>
      <div style="font-size:10px;color:#aaa;margin-top:3px;">
        <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent);">aistudio.google.com</a>에서 무료 발급
      </div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:0;">
    <div class="panel-title">환자 정보</div>
    <div class="form-group">
      <label>등록번호</label>
      <input type="text" id="pid" placeholder="예) 12345">
    </div>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="pname" placeholder="홍길동">
    </div>
    <div class="form-group">
      <label>Total IgE (IU/mL)</label>
      <input type="text" id="ige" placeholder="예) 285">
    </div>
    <div class="form-group">
      <label>검사일</label>
      <input type="date" id="testDate">
    </div>

    <div class="panel-title" style="margin-top:4px;">검사 결과 붙여넣기</div>
    <div class="hint">
      검사실 보고 형식 그대로:<br>
      <code>- Class 1 : 느릅나무, 미루나무</code><br>
      <code>- Class 2 : 개암나무, 참나무, ...</code>
    </div>
    <textarea id="rawInput" placeholder="- Class 1 : 느릅나무, 미루나무, 소나무&#10;- Class 2 : 개암나무, 참나무&#10;- Class 3 : 오리나무&#10;..."></textarea>

    <div class="err" id="errMsg"></div>
    <button class="btn-gen" onclick="generate()">보고서 생성</button>
    <button class="btn-print" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
  </div>

  <!-- 결과 패널 -->
  <div class="result-panel" id="resultPanel">
    <div class="placeholder" id="placeholder">
      <svg width="56" height="56" viewBox="0 0 64 64" fill="none">
        <rect x="8" y="4" width="40" height="52" rx="4" stroke="#ccc" stroke-width="2"/>
        <line x1="16" y1="16" x2="40" y2="16" stroke="#ccc" stroke-width="2"/>
        <line x1="16" y1="24" x2="40" y2="24" stroke="#ccc" stroke-width="2"/>
        <line x1="16" y1="32" x2="32" y2="32" stroke="#ccc" stroke-width="2"/>
      </svg>
      <span>왼쪽에 환자 정보와 검사 결과를 입력하면<br>보고서가 이곳에 표시됩니다</span>
    </div>
    <div class="report" id="report"></div>
  </div>
</div>

const dbMap = {};
ALLERGY_DB.forEach(item => {
  dbMap[item["항목명"].trim().toLowerCase().replace(/\s+/g,"")] = item;
});

function findAllergen(name) {
  const c = name.trim().toLowerCase().replace(/\s+/g,"");
  if (dbMap[c]) return dbMap[c];
  for (const [k,v] of Object.entries(dbMap)) {
    if (k.includes(c) || c.includes(k)) return v;
  }
  return null;
}

function parseInput(raw) {
  const result = {};
  raw.split("\n").forEach(line => {
    const m = line.match(/class\s*(\d+)\s*[:\-]\s*(.+)/i);
    if (!m) return;
    const cls = parseInt(m[1]);
    const names = m[2].split(/[,，、]/).map(n=>n.trim()).filter(Boolean);
    if (!result[cls]) result[cls] = [];
    result[cls].push(...names);
  });
  return result;
}

const CLASS_LV = {1:"낮음",2:"경도",3:"중등도",4:"중등-중증",5:"중증",6:"최중증"};
const CLASS_COLOR = {1:"c1",2:"c2",3:"c3",4:"c4",5:"c5",6:"c6"};

function generate() {
  const pid   = document.getElementById("pid").value.trim();
  const pname = document.getElementById("pname").value.trim();
  const ige   = document.getElementById("ige").value.trim();
  const raw   = document.getElementById("rawInput").value.trim();
  const errEl = document.getElementById("errMsg");
  errEl.style.display = "none";
  if (!raw) { errEl.textContent="검사 결과를 입력해주세요."; errEl.style.display="block"; return; }
  const parsed = parseInput(raw);
  if (!Object.keys(parsed).length) {
    errEl.textContent='형식 오류: "- Class 1 : 항원명1, 항원명2" 형식으로 입력하세요.';
    errEl.style.display="block"; return;
  }
  const total = Object.values(parsed).reduce((s,a)=>s+a.length,0);
  const dateInput = document.getElementById("testDate").value;
  const today = dateInput
    ? new Date(dateInput).toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"})
    : new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"});
  const classSorted = Object.keys(parsed).map(Number).sort((a,b)=>b-a);

  let rows = "";
  classSorted.forEach(cls => {
    parsed[cls].forEach((name, i) => {
      const d = findAllergen(name);
      const isFirst = (i === 0);
      const rowspan = parsed[cls].length;
      const clsCell = isFirst
        ? `<td rowspan="${rowspan}" style="text-align:center;vertical-align:middle;border-right:2px solid #e0e4ec;">
            <span class="cb ${CLASS_COLOR[cls]}">Class ${cls}</span><br>
            <span style="font-size:9px;color:#888;">${CLASS_LV[cls]||""}</span>
           </td>`
        : "";
      if (d) {
        const cross = (d["교차 반응 가능 항목"]||"").trim();
        const hasCross = cross && cross !== "없음";
        const tags = hasCross
          ? cross.split(/[\s,]+/).filter(Boolean).map(t=>`<span class="ct">${t}</span>`).join("")
          : '<span style="color:#bbb;font-size:9px;">—</span>';
        rows += `<tr>
          ${clsCell}
          <td><span class="aname">${d["항목명"]}</span><span class="season-badge">${d["계절"]}</span></td>
          <td>${d["증상 악화 상황"]}</td>
          <td><div class="ctags">${tags}</div></td>
          <td class="warn-txt">${d["주의사항"]}</td>
          <td class="imp-txt">${d["개선 방법"]}</td>
        </tr>`;
      } else {
        rows += `<tr>
          ${clsCell}
          <td colspan="5"><span class="aname">${name}</span> <span style="color:#aaa;font-size:9px;">(DB 미등록)</span></td>
        </tr>`;
      }
    });
  });

  const html = `
    <div class="rpt-head">
      <div><img src="${LOGO_URI}" alt="청아소아청소년과"></div>
      <div class="rpt-head-right">
        <div class="rpt-title">알레르기 항원 검사 안내문</div>
        <div class="rpt-meta">
          ${pid   ? `<div class="meta-item"><div class="meta-lbl">등록번호</div><div class="meta-val">${pid}</div></div>` : ""}
          ${pname ? `<div class="meta-item"><div class="meta-lbl">이름</div><div class="meta-val">${pname}</div></div>` : ""}
          ${ige   ? `<div class="meta-item"><div class="meta-lbl">Total IgE</div><div class="meta-val ige">${ige} IU/mL</div></div>` : ""}
          <div class="meta-item"><div class="meta-lbl">검사일</div><div class="meta-val" style="font-size:12px;font-weight:500;">${today}</div></div>
        </div>
      </div>
    </div>
    <div class="summary">총 <strong>${total}개</strong> 항원 양성 반응 · Class가 높을수록 반응 강도가 강합니다</div>
    <table class="rpt-table">
      <thead>
        <tr>
          <th style="width:70px;">등급</th>
          <th style="width:110px;">항원명</th>
          <th style="width:130px;">증상 악화 상황</th>
          <th>교차반응 항원</th>
          <th style="width:110px;">주의 항목</th>
          <th style="width:120px;">관리 방법</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="rpt-footer">
      ※ 본 결과는 MAST 검사 결과를 바탕으로 한 안내 자료입니다. 교차반응 항목은 개인에 따라 다를 수 있으며, 실제 반응 여부는 담당 의사와 상담하세요.
    </div>
  `;

  const aiSectionHTML = `
    <div class="ai-section" id="aiSection">
      <div class="ai-section-header">
        <span class="ai-badge">AI</span>
        <span class="ai-title">검사 결과 분석 및 권고사항</span>
        <span class="ai-sub">Gemini AI 분석 · 참고용</span>
      </div>
      <div class="ai-body loading" id="aiBody">
        <div class="ai-spinner"></div> AI가 검사 결과를 분석 중입니다...
      </div>
    </div>
  `;

  const el = document.getElementById("report");
  el.innerHTML = html + aiSectionHTML;
  el.style.display = "block";
  document.getElementById("placeholder").style.display = "none";
  el.scrollIntoView({behavior:"smooth",block:"start"});

  const allergenDetails = [];
  classSorted.forEach(cls => {
    parsed[cls].forEach(name => {
      allergenDetails.push({ name, cls, data: findAllergen(name) });
    });
  });

  runAIAnalysis(pid, pname, ige, parsed, allergenDetails);
}

  aiBody.innerHTML = '<div class="ai-spinner"></div> AI가 검사 결과를 분석 중입니다...';

  const lines = [];
  const classSorted = Object.keys(parsed).map(Number).sort((a,b)=>b-a);
  classSorted.forEach(cls => {
    lines.push(`[Class ${cls}] ${parsed[cls].join(", ")}`);
  });

  const detailLines = allergenDetails.map(d => {
    if (!d.data) return `- ${d.name}: (DB 미등록)`;
    return `- ${d.data["항목명"]} (Class ${d.cls}): 교차반응=${d.data["교차 반응 가능 항목"]}, 주의=${d.data["주의사항"]}`;
  }).join("\n");

  const prompt = `당신은 소아청소년과 전문의를 보조하는 알레르기 전문 AI입니다.
다음은 ${pname || "환아"}(등록번호: ${pid||"-"})의 MAST 알레르기 검사 결과입니다.${ige ? ` Total IgE: ${ige} IU/mL.` : ""}

[검사 결과]
${lines.join("\n")}

[항원 상세]
${detailLines}

위 결과를 바탕으로 아래 항목에 맞춰 보호자용 안내문 형식으로 분석해주세요. 의학적으로 정확하되 보호자가 이해하기 쉬운 언어로 작성하고, HTML 태그(h3, ul, li, strong, p)만 사용하세요. 마크다운 기호(#, *, -)는 사용하지 마세요.

<h3>1. 전체 감작 패턴 해석</h3>
검사 결과의 전반적인 의미, Class 등급 분포, Total IgE 해석 포함

<h3>2. 특히 주의해야 할 항원</h3>
Class 3 이상 항원 위주로 왜 중요한지 설명

<h3>3. 교차반응 주의사항</h3>
양성 항원들 간의 주요 교차반응 관계와 실생활에서 주의할 식품/환경 안내

<h3>4. 생활 속 관리 권고</h3>
식이 조절, 환경 관리, 계절별 주의사항 등 구체적 실천 방법

<h3>5. 추가 검사 또는 치료 고려사항</h3>
면역치료 대상 가능성, 추적 검사 권고 등`;

  const apiKey = document.getElementById("apiKey").value.trim();
  if (!apiKey) {
    aiBody.className = "";
    aiBody.innerHTML = '<div class="ai-error">⚠ 왼쪽 패널에 Google Gemini API 키를 입력해주세요.<br><a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:#2d5a8e;">aistudio.google.com</a>에서 무료 발급</div>';
    return;
  }

  try {
    // 사용 가능한 모델 순서대로 시도
    const models = [
      "gemini-2.0-flash",
      "gemini-2.0-flash-lite",
      "gemini-1.5-flash",
      "gemini-1.5-flash-latest",
      "gemini-1.5-pro"
    ];

    let response, data, lastError;
    for (const model of models) {
      try {
        response = await fetch(
          "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent?key=" + apiKey,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { maxOutputTokens: 2000, temperature: 0.3 }
            })
          }
        );
        if (response.ok) { data = await response.json(); break; }
        const errData = await response.json().catch(() => ({}));
        lastError = errData?.error?.message || "HTTP " + response.status;
        if (!lastError.includes("not found") && !lastError.includes("not supported")) {
          throw new Error(lastError);
        }
      } catch(e) {
        if (!e.message.includes("not found") && !e.message.includes("not supported")) throw e;
        lastError = e.message;
      }
    }

    if (!data) throw new Error("사용 가능한 Gemini 모델을 찾을 수 없습니다: " + lastError);

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    aiBody.className = "ai-body";
    aiBody.innerHTML = text;
  } catch(err) {
    aiBody.className = "";
    aiBody.innerHTML = '<div class="ai-error">⚠ AI 분석 중 오류가 발생했습니다: ' + err.message + '</div>';
  }
}

function saveApiKey() {
  const key = document.getElementById("apiKey").value.trim();
  if (!key) { showKeyStatus("키를 입력해주세요", "#c0392b"); return; }
  localStorage.setItem("chungah_gemini_key", key);
  showKeyStatus("저장되었습니다", "#27ae60");
}

function clearApiKey() {
  localStorage.removeItem("chungah_gemini_key");
  document.getElementById("apiKey").value = "";
  showKeyStatus("삭제되었습니다", "#e67e22");
}

function showKeyStatus(msg, color) {
  const el = document.getElementById("apiKeyStatus");
  el.textContent = msg;
  el.style.color = color;
  setTimeout(() => { el.textContent = ""; }, 3000);
}

function loadApiKey() {
  const saved = localStorage.getItem("chungah_gemini_key");
  if (saved) {
    document.getElementById("apiKey").value = saved;
    document.getElementById("apiKeyStatus").textContent = "저장된 키 불러옴";
    document.getElementById("apiKeyStatus").style.color = "#27ae60";
  }
}

window.addEventListener("DOMContentLoaded", loadApiKey);
document.addEventListener("keydown", e => { if (e.ctrlKey && e.key === "Enter") generate(); });
</script>
